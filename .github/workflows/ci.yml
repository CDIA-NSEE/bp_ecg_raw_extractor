name: CI
on: [push, pull_request]

# Shared setup is extracted into a reusable set of steps via composite.
# Each job checks out + installs deps independently — GitHub caches make this fast.

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - run: uv run task lint

  format:
    name: Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - run: uv run task fmt-check

  typecheck:
    name: Type Check (pyrefly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - run: uv run task typecheck

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --frozen
      - run: uv run task test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, test]  # all checks must pass before building
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v5
        with:
          push: false
          tags: bp_ecg_raw_extractor:ci
